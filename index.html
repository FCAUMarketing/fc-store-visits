<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC Store Visit Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px;line-height:1.5}
  .header{background:#ff6600;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .header-title{color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
  .header-title svg{width:22px;height:22px;fill:#fff;opacity:.9}
  .header-sub{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px}
  .tab-bar{background:#fff;border-bottom:1px solid #e5e5e5;display:flex;padding:0 24px}
  .tab{padding:12px 18px;font-size:13px;font-weight:500;color:#666;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s}
  .tab:hover{color:#ff6600}
  .tab.active{color:#ff6600;border-bottom-color:#ff6600}
  .main{max-width:960px;margin:0 auto;padding:24px}
  .card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:20px;margin-bottom:12px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .form-group label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px}
  select,input[type=text],input[type=date],input[type=url],textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;transition:border-color .15s}
  select:focus,input:focus,textarea:focus{outline:none;border-color:#ff6600;box-shadow:0 0 0 3px rgba(255,102,0,.1)}
  textarea{resize:vertical;min-height:72px}
  .btn-primary{background:#ff6600;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:background .15s}
  .btn-primary:hover{background:#e55a00}
  .btn-teams{background:#fff;border:1px solid #ddd;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#444;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
  .btn-teams:hover{border-color:#464EB8;color:#464EB8;background:#f0f1fb}
  .btn-teams.copied{border-color:#107c10;color:#107c10;background:#f0f9f0}
  .btn-teams svg{width:14px;height:14px}
  .check-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .check-block{background:#fafafa;border:1px solid #e8e8e8;border-radius:6px;padding:12px}
  .check-block label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:6px}
  .detail-box{margin-top:8px;display:none}
  .detail-box textarea{min-height:52px;font-size:12px;background:#fff}
  .img-hint{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
  .visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:16px;margin-bottom:8px;transition:box-shadow .15s}
  .visit-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
